name: quarter

on:
  push:

jobs:
  event:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        initiate: ["renew", "signature", "atmosphere", "minus", "decline"]
        create: ["wooden", "ambulance", "record", "transformation"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar VG.jar
